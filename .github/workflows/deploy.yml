# Build the Docusaurus site and deploy it to GitHub Pages.
#
# Firebase Hosting is the primary host (see firebase.json + the
# `yarn firebase:deploy` script); this workflow keeps a free GitHub Pages
# mirror in sync on every push to `main`. The custom domain
# (ai-personal-assistant-docs.aoneahsan.com) is served via static/CNAME.
#
# Enable once in the repo: Settings → Pages → Build and deployment →
# Source = "GitHub Actions".

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack (Yarn Berry)
        run: |
          corepack enable
          corepack prepare yarn@4.17.0 --activate

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build site
        run: yarn build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
